<!doctype html>
<html lang="en">
<head>
<script>/*canonical-url-guard*/(function(){var p=location.pathname;if(/\/index\.html$/.test(p)){location.replace(p.replace(/index\.html$/,"")+location.search+location.hash);}else if(/\.html$/.test(p)){location.replace(p.slice(0,-5)+location.search+location.hash);}})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Regular — Hero</title>
<style>
  :root{
    --sand:#F3EEE7; --ink:#1F1B17; --gold:#C99A3F; --red:#C0392B;
    --muted:rgba(255,255,255,.82);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:#fff;background:var(--ink)}

  .hero{position:relative;height:100svh;min-height:560px;overflow:hidden;display:flex;align-items:center;justify-content:center}

  /* Background video loop */
  .hero__bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  /* Legibility gradient over the calm footage */
  .hero__scrim{position:absolute;inset:0;z-index:1;
    background:
      radial-gradient(120% 90% at 50% 60%, rgba(20,16,12,.10) 0%, rgba(20,16,12,.45) 70%, rgba(20,16,12,.66) 100%);}

  .hero__content{position:relative;z-index:2;text-align:center;padding:0 24px;max-width:880px}
  .eyebrow{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:22px}
  h1{font-size:clamp(30px,5vw,58px);line-height:1.08;font-weight:600;letter-spacing:-.01em;
     text-shadow:0 1px 30px rgba(0,0,0,.35)}
  h1 .em{color:#fff}
  .sub{margin:22px auto 0;max-width:540px;font-size:clamp(15px,1.6vw,18px);line-height:1.5;color:var(--muted)}
  .cta{display:inline-flex;align-items:center;gap:10px;margin-top:34px;
       background:#fff;color:var(--ink);text-decoration:none;font-weight:600;font-size:16px;
       padding:15px 28px;border-radius:999px;transition:transform .2s ease,box-shadow .2s ease;
       box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .cta:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.32)}
  .cta .dot{width:8px;height:8px;border-radius:50%;background:var(--red)}

  /* respect reduced motion: show poster, pause video */
  @media (prefers-reduced-motion: reduce){ .hero__bg{display:none} .hero{background:#1F1B17 center/cover no-repeat} }
</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <section class="hero">
    <video class="hero__bg" autoplay muted loop playsinline preload="auto" poster="regular_hero_poster.jpg">
      <source src="regular_hero_loop.webm" type="video/webm">
      <source src="regular_hero_loop.mp4" type="video/mp4">
    </video>
    <div class="hero__scrim"></div>

    <div class="hero__content">
      <p class="eyebrow">New Deep Relationship</p>
      <h1>Your relationship won't be what it was.<br><span class="em">It can be something deeper.</span></h1>
      <p class="sub">An AI buddy for new parents — it knows your context and your tiredness, and turns "something's off" into one small thing tonight.</p>
      <a class="cta" href="#"><span class="dot"></span>Start your Regular</a>
    </div>
  </section>
</body>
</html>
